<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — Iliana Papadopoulou</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body style="overflow-y: auto; background: #fff;">

    <nav class="page-nav" id="project-nav" style="background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, transparent 100%);">
      <a href="/" style="color: rgba(0,0,0,0.5);">index</a>
      <a href="/info.html" style="color: rgba(0,0,0,0.5);">info</a>
    </nav>

    <div class="page-body project" id="project-content">
      <p>Loading…</p>
    </div>

    <script type="module">
      import { projects } from '/src/projects.js';

      const params  = new URLSearchParams(window.location.search);
      const id      = params.get('id');
      const project = projects.find((p) => p.slug === id);
      const container = document.getElementById('project-content');

      if (!project) {
        container.innerHTML = `
          <h1>Project not found</h1>
          <a class="back-link" href="/">← index</a>
        `;
      } else {
        document.title = `${project.title} — Iliana Papadopoulou`;

        // ── External link buttons ────────────────────────────────────────────
        const linksHTML = project.links.length
          ? `<div class="project-links">
              ${project.links.map(l =>
                `<a class="project-link-btn" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
              ).join('')}
             </div>`
          : '';

        // ── Image gallery (supports plain strings or { src, caption } objects) ──
        const imagesHTML = project.images.length
          ? `<div class="project-gallery">
              ${project.images.map(item => {
                const src     = typeof item === 'string' ? item : item.src;
                const caption = typeof item === 'string' ? '' : (item.caption || '');
                return `<figure class="project-figure">
                  <img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'" />
                  ${caption ? `<figcaption>${caption}</figcaption>` : ''}
                </figure>`;
              }).join('')}
             </div>`
          : '';

        // ── Video embeds ─────────────────────────────────────────────────────
        const videosHTML = project.videos.length
          ? `<div class="project-videos">
              ${project.videos.map(src =>
                `<div class="video-wrap">
                   <iframe src="${src}" frameborder="0" allowfullscreen
                     allow="autoplay; encrypted-media; picture-in-picture">
                   </iframe>
                 </div>`
              ).join('')}
             </div>`
          : '';

        // ── Video background hero ─────────────────────────────────────────────
        if (project.videoBg) {
          const hero = document.createElement('div');
          hero.className = 'video-hero';
          hero.innerHTML = `<iframe src="${project.videoBg}" frameborder="0"
            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
          document.body.insertBefore(hero, container);
          document.body.classList.add('has-video-bg');
          const nav = document.getElementById('project-nav');
          nav.style.background = 'linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 100%)';
          nav.querySelectorAll('a').forEach(a => a.style.color = 'rgba(255,255,255,0.8)');
        }

        // ── Helper: render one image figure ──────────────────────────────────
        function figureHTML(item) {
          const src     = typeof item === 'string' ? item : item.src;
          const caption = typeof item === 'string' ? '' : (item.caption || '');
          return `<figure class="project-figure">
            <img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'" />
            ${caption ? `<figcaption>${caption}</figcaption>` : ''}
          </figure>`;
        }

        // ── Layout: featured (image left + text right, then image pair) ───────
        if (project.layout === 'featured' && project.images.length) {
          const [first, ...rest] = project.images;
          container.innerHTML = `
            <a class="back-link" href="/">← index</a>
            <h1>${project.title}</h1>
            <span class="tag">${project.category}</span>

            <div class="layout-featured">
              <div class="featured-left">${figureHTML(first)}</div>
              <div class="featured-right">
                <div class="project-text">${project.text}</div>
                ${linksHTML}
              </div>
              ${rest.map(figureHTML).join('')}
            </div>

            ${videosHTML}
          `;

        // ── Layout: default ───────────────────────────────────────────────────
        } else {
          container.innerHTML = `
            <a class="back-link" href="/">← index</a>
            <h1>${project.title}</h1>
            <span class="tag">${project.category}</span>
            <div class="project-text">${project.text}</div>
            ${linksHTML}
            ${project.images.length ? `<div class="project-gallery">
              ${project.images.map(figureHTML).join('')}
            </div>` : ''}
            ${videosHTML}
          `;
        }

        // ── Next project footer ───────────────────────────────────────────────
        const currentIndex = projects.findIndex((p) => p.slug === id);
        const next = projects[(currentIndex + 1) % projects.length];
        const footer = document.createElement('footer');
        footer.className = 'project-footer';
        footer.innerHTML = `
          <a class="next-project-link" href="/project.html?id=${next.slug}">
            <span class="next-label">next</span>
            <span class="next-title">${next.title}</span>
          </a>
        `;
        document.body.appendChild(footer);
      }
    </script>

  </body>
</html>
